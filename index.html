<!DOCTYPE html>
<html>
<head>
    <title>Simple Webpage Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            overflow: hidden;
        }

        nav a {
            float: left;
            display: block;
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background-color: #575757;
        }

        .container {
            display: flex;
        }

        .main {
            flex: 3;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .sidebar {
            flex: 1;
            padding: 20px;
            background-color: #ddd;
        }

        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my simple webpage</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="main">
        <h2>Main Content</h2>
        <p>This is the main area of the webpage.</p>
    </div>

    <div class="sidebar">
        <h3>Sidebar</h3>
        <p>Additional links or info here.</p>
    </div>
</div>

<footer>
    <p>© 2026 My Website | All rights reserved</p>
</footer>

</body>
</html>
